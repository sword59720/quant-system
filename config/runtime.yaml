enabled: true
env: live          # 全局运行环境（主要影响 crypto 等自动执行链路）: paper | live
strategy_execution:
  stock_etf: paper_manual   # paper | paper_manual | live
  stock_single: live
  crypto: live
# 兼容旧配置：股票默认券商（当未配置 stock_brokers 时生效）
broker: guotou     # guotou | myquant
# 按策略覆盖券商（优先级高于 broker）
stock_brokers:
  stock_etf: guotou
  stock_single: myquant
timezone: Asia/Shanghai
base_currency: CNY
total_capital: 100000
# 2026-03-12 paper position snapshot:
# 159949: 32000 shares @ 1.5490 ≈ 49568
# 518880: 4500 shares @ 10.9340 ≈ 49203
# Total Market Value ≈ 98771
# Remaining Cash ≈ 1229

paths:
  data_dir: ./data
  output_dir: ./outputs
  log_dir: ./logs

execution_quality_alert:
  enabled: true
  report_file: ./outputs/reports/execution_quality_daily.json
  min_orders: 1
  dedup_hours: 12
  thresholds:
    success_rate_min: 0.95
    fill_rate_min: 0.90
    reject_rate_max: 0.05
    p95_execution_latency_ms_max: 2000
    p95_abs_slippage_bps_max: 20

stock_trade_notify:
  enabled: true
  execution_mode: paper_manual
  trades_file: ./outputs/orders/stock_trades.json
  title: 股票交易指令
  send_empty: true
  dedup_hours: 12
  stale_position_hours: 36
